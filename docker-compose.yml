services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gameledger
      POSTGRES_USER: gameledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gameledger}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://gameledger:${POSTGRES_PASSWORD:-gameledger}@db:5432/gameledger
      PORT: 3001
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NODE_ENV: production
      BACKUP_DIR: /backups
    volumes:
      - ${BACKUP_HOST_DIR:-./private_data/backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main"

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  db_data:
