server {
    listen 80;
    server_name _;

    # Proxy /api to the backend (NestJS dev server)
    location /api/ {
        # Maintenance backup restore accepts uploads up to 500 MB (multer limit);
        # allow headroom. pg_dump/pg_restore can run long, so extend proxy timeouts.
        client_max_body_size 512m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Vite HMR websocket — Vite uses /@vite/client + /__vite_hmr (or the default
    # ws:// connection on the same port as the page). With server.hmr.clientPort set to
    # DEV_APP_PORT (nginx port), Vite HMR connects back through nginx on the standard
    # websocket upgrade path. This block catches the upgrade before the catch-all below.
    location /hmr {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy all other requests to the Vite dev server (SPA + assets + HMR websocket upgrade)
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
